repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^config/blueprints/
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.0
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=hass,tha,astroid
          - --skip="./.*,*.csv,*.json,*.ambr"
          - --quiet-level=2
        exclude_types: [csv, json]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: check-api-boundary
        name: "API boundary — no unraid-api bypass"
        entry: python script/check_api_boundary.py
        language: system
        pass_filenames: false
        files: ^custom_components/unraid/.*\.py$

      - id: pip-audit
        name: pip-audit (dependency vulnerability scan)
        language: system
        entry: bash -c 'uv export --no-hashes --frozen > /tmp/pre-commit-requirements.txt && pip-audit --disable-pip --no-deps -r /tmp/pre-commit-requirements.txt'
        files: ^uv\.lock$
        pass_filenames: false
