name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install YAML parser
        run: python3 -m pip install --user pyyaml

      - name: Sync labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          import yaml


          token = os.environ["GITHUB_TOKEN"]
          repository = os.environ["GITHUB_REPOSITORY"]
          api_base = "https://api.github.com"

          with open(".github/labels.yml", encoding="utf-8") as f:
              labels = yaml.safe_load(f) or []


          def request(method: str, path: str, payload: dict | None = None):
              url = f"{api_base}{path}"
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              if data is not None:
                  req.add_header("Content-Type", "application/json")
              with urllib.request.urlopen(req) as resp:
                  body = resp.read().decode("utf-8")
                  return json.loads(body) if body else None


          for label in labels:
              name = label["name"]
              payload = {
                  "name": name,
                  "color": label["color"],
                  "description": label.get("description", ""),
              }
              create_path = f"/repos/{repository}/labels"
              try:
                  request("POST", create_path, payload)
                  print(f"Created label: {name}")
              except urllib.error.HTTPError as err:
                  if err.code != 422:
                      raise
                  patch_path = (
                      f"/repos/{repository}/labels/"
                      f"{urllib.parse.quote(name, safe='')}"
                  )
                  request("PATCH", patch_path, payload)
                  print(f"Updated label: {name}")

          print("Label sync complete (skip-delete behavior preserved).")
          PY
